<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OnAgain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#FAFAF7;font-family:Inter,-apple-system,system-ui,sans-serif;color:#1A1A1A;-webkit-font-smoothing:antialiased}
  a{color:#C4654A;text-decoration:none}
  input{font-family:inherit}
  button{font-family:inherit;cursor:pointer}
  @keyframes oaspin{to{transform:rotate(360deg)}}
  @keyframes oafade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .fade{animation:oafade .3s ease}
  .spin{display:inline-block;border:3px solid #C4654A;border-top-color:transparent;border-radius:50%;animation:oaspin .8s linear infinite}

  .nav{position:sticky;top:0;z-index:5;background:rgba(250,250,247,.9);backdrop-filter:blur(8px);border-bottom:1px solid #E5E2DB;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-size:22px;letter-spacing:-.01em;cursor:pointer}
  .logo b{font-weight:400;color:#1A1A1A}.logo i{font-style:normal;color:#C4654A}
  .btn{background:#C4654A;color:#fff;border:none;font:500 14px Inter;padding:9px 16px;border-radius:8px}
  .btn:hover{background:#A8523B}
  .btn-lg{font-size:15px;padding:13px 24px}
  .btn-ghost{background:transparent;color:#1A1A1A;border:1px solid #E5E2DB;font:500 13px Inter;padding:8px 14px;border-radius:8px}
  .btn-ghost:hover{background:#F5F3EE}
  .wrap{flex:1;padding:28px;max-width:1200px;margin:0 auto;width:100%}
  h1{font-size:24px;font-weight:500;margin:0}
  .sub{font-size:13px;color:#6B7280;margin:2px 0 0}
  .card{background:#F5F3EE;border:1px solid #E5E2DB;border-radius:12px;padding:14px}
  .microlabel{font:600 9px Inter;color:#6B7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
  .pill{font:500 11px Inter;padding:4px 12px;border-radius:9999px;cursor:pointer;border:1px solid #E5E2DB;background:#FAFAF7;color:#9CA3AF}
  .flag{background:#FFFBEB;color:#D97706;font:500 11px Inter;padding:3px 8px;border-radius:9999px}
  .dropzone{border:2px dashed #E5E2DB;border-radius:12px;background:#F5F3EE;padding:56px 24px;text-align:center;cursor:pointer}
  .dropzone:hover{border-color:#C4654A;background:#FDF2EF}
  .basecard{flex:1;border:2px solid #E5E2DB;border-radius:12px;background:#F5F3EE;padding:12px;cursor:pointer}
  .basecard.sel{border-color:#C4654A;background:#FDF2EF}
  .box{position:absolute;border:2px solid #C4654A;border-radius:6px;background:rgba(196,101,74,.06)}
  .boxlabel{position:absolute;top:-9px;left:-1px;background:#C4654A;color:#fff;font:500 9px Inter;padding:1px 6px;border-radius:4px;white-space:nowrap}
  .stepdot{width:14px;height:14px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:8px;flex:none}
  .specrow{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .speck{font:400 11px Inter;color:#9CA3AF;flex:none}
  .specv{flex:1;min-width:0;background:transparent;border:none;border-bottom:1px dashed transparent;font:500 11px Inter;color:#1A1A1A;text-align:right;padding:0 0 1px}
  .specv:hover{border-bottom-color:#D9D4CA}.specv:focus{outline:none;border-bottom-color:#C4654A}
  .field{width:100%;background:#FAFAF7;border:1px solid #E5E2DB;border-radius:8px;font:500 12px Inter;color:#1A1A1A;padding:7px 9px}
  .field:focus{border-color:#C4654A;outline:none}
</style>
</head>
<body>
<div style="min-height:100vh;display:flex;flex-direction:column">
  <div class="nav">
    <div style="display:flex;align-items:center;gap:16px">
      <div class="logo" onclick="go('upload')"><b>on</b><i>again</i></div>
      <span id="crumb" style="font-size:13px;color:#9CA3AF"></span>
    </div>
    <button class="btn" onclick="go('upload')"><span style="font-size:16px;line-height:1">+</span> New batch</button>
  </div>
  <div class="wrap" id="main"></div>
</div>
<script src="app.js"></script>
</body>
</html>
